services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '127.0.0.1:5432:5432'
    environment:
      POSTGRES_USER: isuperhero
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: isuperhero_stage
    volumes:
      - /data/postgres/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U isuperhero -d isuperhero_stage']
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    image: ${APP_IMAGE}
    restart: unless-stopped
    ports:
      - '80:2567'
      - '2567:2567'
    environment:
      PORT: '2567'
      DATABASE_URL: postgresql://isuperhero:${POSTGRES_PASSWORD}@postgres:5432/isuperhero_stage
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
