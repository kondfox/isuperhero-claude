name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Test & Typecheck
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: isuperhero
          POSTGRES_PASSWORD: password
          POSTGRES_DB: isuperhero_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U isuperhero"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint & format check
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Run unit tests
        run: bun run test

      - name: Run DB migrations
        run: cd apps/server && bun run db:migrate
        env:
          DATABASE_URL: postgresql://isuperhero:password@localhost:5432/isuperhero_test

      - name: Seed database
        run: cd apps/server && bun run db:seed
        env:
          DATABASE_URL: postgresql://isuperhero:password@localhost:5432/isuperhero_test

  playwright:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: cd apps/web && bun run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  terraform-plan-stage:
    name: Terraform Plan (stage)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"

      - name: Terraform Init (stage)
        run: terraform init
        working-directory: infra/envs/stage
        env:
          TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN_STAGE }}
          TF_VAR_ssh_key_name: ${{ secrets.HETZNER_SSH_KEY_NAME }}

      - name: Terraform Plan (stage)
        run: terraform plan -input=false
        working-directory: infra/envs/stage
        env:
          TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN_STAGE }}
          TF_VAR_ssh_key_name: ${{ secrets.HETZNER_SSH_KEY_NAME }}
