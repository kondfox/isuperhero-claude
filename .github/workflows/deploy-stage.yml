name: Deploy to Stage

on:
  push:
    branches: [main]

concurrency:
  group: deploy-stage
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=stage

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Stage Server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: stage
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGE_SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: infra/docker-compose.stage.yml
          target: /opt/isuperhero/
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGE_SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/isuperhero

            # Stop nginx if running (frees port 80 for the app)
            systemctl stop nginx 2>/dev/null || true
            systemctl disable nginx 2>/dev/null || true

            # Use the stage compose file
            mv -f docker-compose.stage.yml docker-compose.yml

            # Write env file for compose variables
            cat > .env << EOF
            POSTGRES_PASSWORD=${{ secrets.STAGE_PG_PASSWORD }}
            APP_IMAGE=ghcr.io/${{ github.repository }}:stage
            EOF

            # Ensure stable volume symlink exists
            VOLUME_MOUNT=$(ls -d /mnt/HC_Volume_* 2>/dev/null | head -1)
            if [ -n "$VOLUME_MOUNT" ]; then
              mkdir -p /data
              ln -sfn "$VOLUME_MOUNT" /data/postgres
            fi

            # Log in to GHCR and pull latest image
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository }}:stage

            # Start PostgreSQL and wait for it to be healthy
            docker compose up -d postgres
            for i in $(seq 1 30); do
              if docker compose exec postgres pg_isready -U isuperhero -d isuperhero_stage > /dev/null 2>&1; then
                echo "PostgreSQL is ready."
                break
              fi
              echo "Waiting for PostgreSQL... ($i/30)"
              sleep 2
            done

            # Run database migrations
            docker run --rm \
              --network isuperhero_default \
              -e DATABASE_URL="postgresql://isuperhero:${{ secrets.STAGE_PG_PASSWORD }}@postgres:5432/isuperhero_stage" \
              ghcr.io/${{ github.repository }}:stage \
              sh -c "cd apps/server && bun x drizzle-kit migrate"

            # Start/restart the app
            docker compose up -d

            # Clean up old images
            docker system prune -f
